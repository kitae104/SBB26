<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>질문 리스트</title>
</head>
<body>
    <h1>질문 리스트</h1>
    <h3>데이터1</h3>
    <h4 th:text="${questionList}"></h4>
    <h3>데이터2</h3>
    <ul>
        <li th:each="question : ${questionList}" th:text="${question.subject}"></li>
    </ul>
    <h3>테이블</h3>
    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="question, loop : ${questionList}">
            <td th:text="${loop.count}">번호</td>
            <td>
                <a th:href="@{|/question/detail/${question.id}|}" th:text="${question.subject}">제목</a>
            </td>
            <td th:text="${#temporals.format(question.created, 'yyyy-MM-dd HH:mm')}">작성일</td>
        </tr>
        </tbody>
    </table>
</body>
</html>
