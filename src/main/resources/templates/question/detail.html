<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Question Detail</title>
</head>
<body>
    <h1 th:text="${question.subject}">상세 페이지</h1>
    <div th:text="${question.content}"></div>
    <h5 th:text="|${#lists.size(question.answerList)}개의 답변이 있습니다.|">리스트</h5>
    <div>
        <ul>
            <li th:each="answer : ${question.answerList}">
                <div th:text="${answer.content}"></div>
            </li>
        </ul>
    </div>
    <form th:action="@{|/answer/create/${question.id}|}" method="post">
        <textarea id="content" name="content" rows="15"></textarea>
        <input type="submit" value="답변 등록">
    </form>
</body>
</html>
